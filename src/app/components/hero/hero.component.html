<section class="hero" id="hero">
  <!-- Spline 3D Background -->
  <div class="spline-bg">
    <spline-viewer url="https://prod.spline.design/figoCXdRz9vqlgy6/scene.splinecode" loading-anim-type="none">
    </spline-viewer>
  </div>



  <!-- Content -->
  <div class="hero-content container">
    <div class="hero-badge">
      <span class="badge-dot"></span>
      Agencia Digital en Colombia
    </div>

    <h1 class="hero-title">
      <span class="title-row">
        <span class="gradient-text">Deploy</span>
        <img src="assets/logo.png" alt="Deploy Logo" class="logo-img2">
      </span>
      <span class="title-line">Impulsamos tu negocio!</span>
    </h1>

    <!--<p class="hero-subtitle">
      Desarrollo No de Software y Marketing Digital
    </p>-->

    <p class="hero-description">
      Creamos experiencias digitales que transforman ideas en resultados.
      Diseño, desarrollo y estrategia bajo un mismo equipo.
    </p>

    <div class="hero-actions">
      <a class="btn btn-primary" (click)="scrollTo('servicios')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        Nuestros Servicios
      </a>
      <a class="btn btn-outline" href="https://wa.me/573137733408" target="_blank">
        Hablemos
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>
    </div>

    <!-- Stats -->
    <div class="hero-stats">
      <div class="stat-item" *ngFor="let stat of stats">
        <span class="stat-value">{{ stat.value }}{{ stat.suffix }}</span>
        <span class="stat-label">{{ stat.label }}</span>
      </div>
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="scroll-indicator" (click)="scrollTo('servicios')">
    <div class="mouse">
      <div class="mouse-wheel"></div>
    </div>
    <span>Scroll</span>
  </div>
</section>
